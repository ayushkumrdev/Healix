<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark light" />
  <title>Healix</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <script>/* theme before first paint */document.documentElement.dataset.theme = localStorage.getItem("healix-theme") || "dark";</script>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 5 25 10.25 25 20.75 16 26 7 20.75 7 10.25Z" opacity=".45" />
            <path d="M9 16h2.4l1.7-3.8 3 7.2 2.1-5.6L20 16h3" />
          </svg>
        </span>
        <span class="brand-text">
          <span class="brand-name">Healix</span>
          <span class="brand-sub">Medical Intelligence</span>
        </span>
      </div>

      <button id="newChat" class="new-chat">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        New consultation
      </button>

      <div class="conv-scroll">
        <div class="conv-group-label">Recent</div>
        <div id="convList" class="conv-list"></div>
      </div>

      <div class="side-foot">
        <span class="ok-dot"></span>
        <span>Local &amp; private<span id="deviceFoot"></span></span>
      </div>
    </aside>

    <main id="main">
      <header id="topbar">
        <button id="menuBtn" class="icon-btn" title="Menu" aria-label="Toggle sidebar">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <div id="chatTitle">New consultation</div>
        <button id="themeBtn" class="icon-btn" title="Toggle theme" aria-label="Toggle light and dark theme">
          <svg class="moon" viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
          <svg class="sun" viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        </button>
        <div class="status-pill"><span class="ok-dot"></span><span id="deviceLabel">local</span></div>
      </header>

      <div id="thread" class="thread"></div>

      <div id="composer-wrap">
        <div id="composer">
          <div id="attachPreview" class="attach-preview hidden"></div>
          <div class="composer-row">
            <button id="attachBtn" class="attach-btn" title="Attach a medical image" aria-label="Attach image">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
            </button>
            <textarea id="input" rows="1" placeholder="Describe a symptom, ask about a medication…"></textarea>
            <button id="sendBtn" class="send-btn" disabled aria-label="Send">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M6 11l6-6 6 6"/></svg>
            </button>
          </div>
          <div class="composer-hint"><span class="ok-dot"></span>Private by design — runs entirely on this device</div>
        </div>
      </div>
      <input type="file" id="fileInput" accept="image/png,image/jpeg" hidden />
    </main>
  </div>
  <script src="/app.js"></script>
</body>
</html>
